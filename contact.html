<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact | My Personal Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="assets/images/kmu-logo.jpg" width="44" height="44" alt="" />
          <span class="brand-text">
            <span class="brand-title">My Portfolio</span>
            <span class="brand-sub">Albert Mulenga</span>
          </span>
        </a>
        <button
          type="button"
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="site-menu"
          aria-label="Toggle menu"
        >
          <span></span><span></span><span></span>
        </button>
        <nav class="site-nav" id="site-menu" aria-label="Primary">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" aria-current="page">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <div class="container">
        <h1 class="section-title reveal">Contact Me</h1>
        </p>
        <div class="contact-layout">
          <form id="contact-form" class="contact-form reveal" action="#" method="post" novalidate>
            <div class="field" data-field="name">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" autocomplete="name" />
              <p class="error-msg" role="alert"></p>
            </div>
            <div class="field" data-field="email">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" autocomplete="email" />
              <p class="error-msg" role="alert"></p>
            </div>
            <div class="field" data-field="message">
              <label for="message">Message</label>
              <textarea id="message" name="message"></textarea>
              <p class="error-msg" role="alert"></p>
            </div>
            <button type="submit" class="btn btn-primary">Send message</button>
            <div class="form-status" role="status" aria-live="polite"></div>
          </form>

          <aside class="reveal" style="color: var(--muted)">
            <h2 class="section-title" style="font-size: 1.25rem; color: var(--text)">Direct</h2>
            <p>Email: <a href="mailto:you@example.com">mulehmumu@example.com</a></p>
            <p style="margin-top: 1.25rem">Call on: 0970000001.</p>
            <div class="uni-banner" style="margin-top: 2rem">
              </div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© <span id="y"></span> My Personal Portfolio.</div>
    </footer>
    <script src="assets/js/script.js"></script>
  </body>
</html>
